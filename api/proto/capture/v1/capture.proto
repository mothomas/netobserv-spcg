syntax = "proto3";

package capture.v1;

option go_package = "github.com/netobserv/spcg/api/proto/capture/v1;capturev1";

// TargetPodRequest identifies a workload capture target within a namespace.
message TargetPodRequest {
  string session_id = 1;
  string namespace = 2;
  string pod_name = 3;
  string pod_uid = 4;
  // Owner-based capture: Deployment, StatefulSet, DaemonSet (netobserv SrcK8S_OwnerType/OwnerName).
  string workload_kind = 5;
  string workload_name = 6;
  string label_selector = 7;
  int32 port = 8;
}

// CaptureChunk is a streamed PCAP byte fragment from oc-netobserv stdout.
message CaptureChunk {
  string session_id = 1;
  string pod_name = 2;
  string pod_uid = 3;
  bytes data = 4;
  uint64 sequence = 5;
  bool stitched_restart = 6;
  uint64 packets_per_sec = 7;
  uint64 cumulative_bytes = 8;
  // JSON object: netobserv K8s enrichment + L4 hints (SrcK8S_*, DstK8S_*, ports, proto).
  string flow_metadata = 9;
}

// CaptureService streams raw packet bytes from privileged netobserv workers.
service CaptureService {
  rpc StreamPackets(stream TargetPodRequest) returns (stream CaptureChunk);
}
