apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-ui-portal
  namespace: {{ .Values.namespaces.frontend }}
spec:
  replicas: {{ .Values.frontend.uiPortal.replicas }}
  selector:
    matchLabels:
      app: spcg-ui-portal
  template:
    metadata:
      labels:
        app: spcg-ui-portal
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ui-portal
          image: {{ .Values.frontend.uiPortal.image }}
          ports:
            - containerPort: 8080
          env:
            - name: ENGINE_GRPC_ADDR
              value: "spcg-backend-engine.{{ .Values.namespaces.capture }}.svc.cluster.local:8443"
          resources:
            {{- toYaml .Values.frontend.uiPortal.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: spcg-ui-portal
  namespace: {{ .Values.namespaces.frontend }}
spec:
  selector:
    app: spcg-ui-portal
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-frontend
  namespace: {{ .Values.namespaces.frontend }}
spec:
  replicas: {{ .Values.frontend.web.replicas }}
  selector:
    matchLabels:
      app: spcg-frontend
  template:
    metadata:
      labels:
        app: spcg-frontend
    spec:
      automountServiceAccountToken: false
      containers:
        - name: frontend
          image: {{ .Values.frontend.web.image }}
          ports:
            - containerPort: 3000
          resources:
            {{- toYaml .Values.frontend.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: spcg-frontend
  namespace: {{ .Values.namespaces.frontend }}
spec:
  selector:
    app: spcg-frontend
  ports:
    - port: 80
      targetPort: 3000
