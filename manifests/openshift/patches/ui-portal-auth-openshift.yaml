# OpenShift: Argo CD–style login — cluster Routes + OAuth client secret only (no domain env).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-ui-portal
  namespace: pcap-frontend
spec:
  template:
    spec:
      # Explicit "default" overwrites stale serviceAccountName: spcg-ui-portal on oc apply.
      serviceAccountName: default
      automountServiceAccountToken: true
      containers:
        - name: ui-portal
          envFrom:
            - configMapRef:
                name: spcg-auth-env
          env:
            - name: SPCG_AUTH_METHODS
              value: openshift
            - name: OAUTH_CLIENT_ID
              value: spcg-ui
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: spcg-oauth-client
                  key: client-secret
            # Token POST uses oauth-openshift Route TLS; ingress CA is often not in the container trust store (Argo insecureCA).
            - name: OAUTH_TLS_INSECURE_SKIP_VERIFY
              value: "true"
