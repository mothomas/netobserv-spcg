# OpenShift: Argo CD–style login — cluster Routes + OAuth client secret only (no domain env).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-ui-portal
  namespace: pcap-frontend
spec:
  template:
    spec:
      serviceAccountName: spcg-ui-portal
      automountServiceAccountToken: true
      containers:
        - name: ui-portal
          envFrom:
            - configMapRef:
                name: spcg-auth-env
          env:
            - name: SPCG_AUTH_METHODS
              value: openshift
            - name: OAUTH_CLIENT_ID
              value: spcg-ui
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: spcg-oauth-client
                  key: client-secret
          readinessProbe:
            httpGet:
              path: /api/v1/auth/config
              port: 8080
            periodSeconds: 10
            failureThreshold: 6
