# OpenShift OAuth: Route discovery, token exchange env, optional oauth serving CA mount.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-ui-portal
  namespace: pcap-frontend
spec:
  template:
    spec:
      serviceAccountName: default
      automountServiceAccountToken: true
      containers:
        - name: ui-portal
          envFrom:
            - configMapRef:
                name: spcg-auth-env
          env:
            - name: OAUTH_CLIENT_ID
              value: spcg-ui
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: spcg-oauth-client
                  key: client-secret
            - name: OAUTH_TLS_INSECURE_SKIP_VERIFY
              value: "true"
            - name: OAUTH_CA_BUNDLE
              value: /etc/oauth-ca/ca-bundle.crt
          volumeMounts:
            - name: oauth-ca
              mountPath: /etc/oauth-ca
              readOnly: true
      volumes:
        - name: oauth-ca
          configMap:
            name: spcg-oauth-serving-ca
            optional: true
