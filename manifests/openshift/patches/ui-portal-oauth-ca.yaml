# OAuth token POST uses oauth-openshift Route TLS; mount cluster oauth serving CA when synced to spcg-oauth-serving-ca.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-ui-portal
  namespace: pcap-frontend
spec:
  template:
    spec:
      containers:
        - name: ui-portal
          env:
            - name: OAUTH_CA_BUNDLE
              value: /etc/oauth-ca/ca-bundle.crt
          volumeMounts:
            - name: oauth-ca
              mountPath: /etc/oauth-ca
              readOnly: true
      volumes:
        - name: oauth-ca
          configMap:
            name: spcg-oauth-serving-ca
            optional: true
