# Explicit Quay refs (public repos — no imagePullSecret required).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-ui-portal
  namespace: pcap-frontend
spec:
  template:
    spec:
      containers:
        - name: ui-portal
          image: quay.io/moby/spcg-ui-portal:small-20260624
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-frontend
  namespace: pcap-frontend
spec:
  template:
    spec:
      containers:
        - name: frontend
          image: quay.io/moby/spcg-frontend:small-20260625
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-backend-engine
  namespace: pcap-capture
spec:
  template:
    spec:
      containers:
        - name: backend-engine
          image: quay.io/moby/spcg-backend-engine:small-20260614
