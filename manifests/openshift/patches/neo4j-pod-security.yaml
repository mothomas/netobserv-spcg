# OpenShift restricted-v2: do not pin uid/fsGroup 7474 (not in namespace SCC ranges).
# Let the admission controller assign runAsUser/fsGroup; emptyDir /data stays writable via fsGroupChangePolicy.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-neo4j
  namespace: pcap-frontend
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        fsGroupChangePolicy: OnRootMismatch
