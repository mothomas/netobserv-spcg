# Inject shared auth ConfigMap (SPCG_AUTH_METHODS) into Next.js.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-frontend
  namespace: pcap-frontend
spec:
  template:
    spec:
      containers:
        - name: frontend
          envFrom:
            - configMapRef:
                name: spcg-auth-env
