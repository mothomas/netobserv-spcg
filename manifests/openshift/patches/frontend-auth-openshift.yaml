# Runtime OpenShift login mode for UI (matches portal SPCG_AUTH_METHODS).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-frontend
  namespace: pcap-frontend
spec:
  template:
    spec:
      containers:
        - name: frontend
          env:
            - name: SPCG_AUTH_METHODS
              value: openshift
