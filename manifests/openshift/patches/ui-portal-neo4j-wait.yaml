# ui-portal starts after Neo4j bolt port is open (avoids crash loop when Neo4j is still starting).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-ui-portal
  namespace: pcap-frontend
spec:
  template:
    spec:
      initContainers:
        - name: wait-neo4j
          # UBI from registry.redhat.io (not docker.io/busybox) — reachable on restricted OCP without pull secrets.
          image: registry.redhat.io/ubi9/ubi-minimal:9.5
          command:
            - sh
            - -c
            - |
              until (echo >/dev/tcp/spcg-neo4j.pcap-frontend.svc.cluster.local/7687) 2>/dev/null; do
                echo "waiting for neo4j..."
                sleep 2
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            # Do not pin runAsUser (65534 is outside namespace SCC UID range → FailedCreate).
            seccompProfile:
              type: RuntimeDefault
