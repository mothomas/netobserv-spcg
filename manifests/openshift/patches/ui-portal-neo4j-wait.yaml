# ui-portal starts after Neo4j bolt port is open (avoids crash loop when Neo4j is still starting).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-ui-portal
  namespace: pcap-frontend
spec:
  template:
    spec:
      initContainers:
        - name: wait-neo4j
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z spcg-neo4j.pcap-frontend.svc.cluster.local 7687; do
                echo "waiting for neo4j..."
                sleep 2
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
