# OpenShift base: Routes, privileged SCC, ClusterIP UI, Neo4j (emptyDir on small).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - config-auth-openshift.yaml
  - rbac-capture.yaml
  - rbac-portal-oauth.yaml
  - route-openshift.yaml
images:
  - name: docker.io/mothomas/spcg-backend-engine
    newName: docker.io/mothomas/spcg-backend-engine
    newTag: small-20260614
  - name: docker.io/mothomas/spcg-ui-portal
    newName: docker.io/mothomas/spcg-ui-portal
    newTag: small-20260624
  - name: docker.io/mothomas/spcg-frontend
    newName: docker.io/mothomas/spcg-frontend
    newTag: small-20260624
patches:
  - path: patches/tolerations.yaml
  - path: patches/neo4j-pod-security.yaml
  - path: patches/ui-portal-neo4j-wait.yaml
  - path: patches/ui-portal-auth-openshift.yaml
  - path: patches/frontend-auth-openshift.yaml
  - path: patches/frontend-troubleshoot.yaml
  - target:
      kind: Service
      name: spcg-frontend
      namespace: pcap-frontend
    patch: |-
      - op: replace
        path: /spec/type
        value: ClusterIP
      - op: replace
        path: /spec/ports
        value:
          - name: http
            port: 80
            targetPort: 3000
