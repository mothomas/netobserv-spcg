# OpenShift base: Routes, privileged SCC, ClusterIP UI, Neo4j (emptyDir on small).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - rbac-capture.yaml
  - route-openshift.yaml
images:
  - name: docker.io/mothomas/spcg-backend-engine
    newName: docker.io/mothomas/spcg-backend-engine
    newTag: small-20260614
  - name: docker.io/mothomas/spcg-ui-portal
    newName: docker.io/mothomas/spcg-ui-portal
    newTag: small-20260614
  - name: docker.io/mothomas/spcg-frontend
    newName: docker.io/mothomas/spcg-frontend
    newTag: small-20260614
patches:
  - path: patches/service-frontend-clusterip.yaml
  - path: patches/tolerations.yaml
  - path: patches/neo4j-pod-security.yaml
