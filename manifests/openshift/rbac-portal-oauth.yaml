# Lets ui-portal discover OAuth and SPCG Route hosts in-cluster (no manual domain env).
# Uses namespace default SA (same as spcg-frontend) so restricted-v2 SCC applies without cluster-admin CRB.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spcg-ui-portal-route-reader
  namespace: pcap-frontend
rules:
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    resourceNames: ["spcg", "spcg-api"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spcg-ui-portal-route-reader
  namespace: pcap-frontend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spcg-ui-portal-route-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: pcap-frontend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spcg-ui-portal-oauth-route-reader
  namespace: openshift-authentication
rules:
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    resourceNames: ["oauth-openshift"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spcg-ui-portal-oauth-route-reader
  namespace: openshift-authentication
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spcg-ui-portal-oauth-route-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: pcap-frontend
