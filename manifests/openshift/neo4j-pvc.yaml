apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spcg-neo4j-data
  namespace: pcap-frontend
  labels:
    app: spcg-neo4j
    spcg.io/tier: graph
spec:
  accessModes:
    - ReadWriteOnce
  # Set to your cluster default StorageClass if PVC stays Pending, e.g. gp3-csi or ocs-storagecluster-ceph-rbd
  # storageClassName: ""
  resources:
    requests:
      storage: 10Gi
