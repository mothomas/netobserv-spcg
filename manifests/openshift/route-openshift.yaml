apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: spcg
  namespace: pcap-frontend
  labels:
    app: spcg-frontend
spec:
  to:
    kind: Service
    name: spcg-frontend
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: spcg-api
  namespace: pcap-frontend
  labels:
    app: spcg-ui-portal
  annotations:
    haproxy.router.openshift.io/timeout: 5m
spec:
  # No path prefix — portal serves /api/v1/* (path: /api would strip prefix → 404).
  to:
    kind: Service
    name: spcg-ui-portal
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
