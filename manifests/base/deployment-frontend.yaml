apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-ui-portal
  namespace: pcap-frontend
  labels:
    app: spcg-ui-portal
    spcg.io/tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spcg-ui-portal
  template:
    metadata:
      labels:
        app: spcg-ui-portal
        spcg.io/tier: frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ui-portal
          image: docker.io/mothomas/spcg-ui-portal:neo4j-sigma-20260602
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: UI_LISTEN
              value: ":8080"
            - name: ENGINE_GRPC_ADDR
              value: "spcg-backend-engine.pcap-capture.svc.cluster.local:8443"
            - name: NEO4J_URI
              value: "bolt://spcg-neo4j.pcap-frontend.svc.cluster.local:7687"
            - name: NEO4J_USER
              value: neo4j
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spcg-neo4j-auth
                  key: password
            - name: GRAPH_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: spcg-graph-master-key
                  key: GRAPH_MASTER_KEY
          envFrom:
            - configMapRef:
                name: spcg-capture-admission
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 20
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: spcg-ui-portal
  namespace: pcap-frontend
spec:
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  selector:
    app: spcg-ui-portal
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-frontend
  namespace: pcap-frontend
  labels:
    app: spcg-frontend
    spcg.io/tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spcg-frontend
  template:
    metadata:
      labels:
        app: spcg-frontend
        spcg.io/tier: frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: docker.io/mothomas/spcg-frontend:neo4j-sigma-20260602
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: SPCG_API_URL
              value: "http://spcg-ui-portal.pcap-frontend.svc.cluster.local:80"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: spcg-frontend
  namespace: pcap-frontend
spec:
  type: NodePort
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  selector:
    app: spcg-frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000
      nodePort: 30080
