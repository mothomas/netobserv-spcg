apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-frontend
  namespace: pcap-frontend
spec:
  template:
    spec:
      containers:
        - name: frontend
          env:
            - name: SPCG_AUTH_METHODS
              value: kubeconfig
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-ui-portal
  namespace: pcap-frontend
spec:
  template:
    spec:
      containers:
        - name: ui-portal
          env:
            - name: SPCG_AUTH_METHODS
              value: kubeconfig
