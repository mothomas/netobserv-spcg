apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - rbac.yaml
  - job.yaml
configMapGenerator:
  - name: spcg-oauth-bootstrap
    files:
      - bootstrap.sh
    options:
      disableNameSuffixHash: true
      labels:
        app.kubernetes.io/component: oauth-bootstrap
        app.kubernetes.io/part-of: spcg
patches:
  - target:
      kind: ConfigMap
      name: spcg-oauth-bootstrap
    patch: |-
      - op: add
        path: /metadata/namespace
        value: spcg-control
