apiVersion: v1
kind: Namespace
metadata:
  name: spcg-landing
  labels:
    app.kubernetes.io/part-of: spcg
    spcg.io/role: landing
    spcg.io/tier: frontend
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: spcg-control
  labels:
    app.kubernetes.io/part-of: spcg
    spcg.io/role: control
    spcg.io/tier: control
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: pcap-capture
  labels:
    app.kubernetes.io/part-of: spcg
    spcg.io/role: capture
    spcg.io/tier: capture
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
