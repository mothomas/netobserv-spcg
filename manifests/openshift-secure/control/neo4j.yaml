apiVersion: v1
kind: Service
metadata:
  name: spcg-neo4j
  namespace: spcg-control
  labels:
    app: spcg-neo4j
spec:
  selector:
    app: spcg-neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7474
      targetPort: 7474
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spcg-neo4j
  namespace: spcg-control
  labels:
    app: spcg-neo4j
    spcg.io/tier: graph
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spcg-neo4j
  template:
    metadata:
      labels:
        app: spcg-neo4j
        spcg.io/tier: graph
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: neo4j
          image: neo4j:5.26-community
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 7687
              name: bolt
            - containerPort: 7474
              name: http
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: spcg-neo4j-auth
                  key: NEO4J_AUTH
            - name: NEO4J_server_memory_heap_initial__size
              value: 512m
            - name: NEO4J_server_memory_heap_max__size
              value: 1G
            - name: NEO4J_dbms_memory_pagecache_size
              value: 512m
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: data
          emptyDir: {}
