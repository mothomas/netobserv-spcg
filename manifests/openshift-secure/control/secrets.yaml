# Change passwords before production. OAuth client secret is NOT here — create spcg-oauth-client manually.
apiVersion: v1
kind: Secret
metadata:
  name: spcg-neo4j-auth
  namespace: spcg-control
type: Opaque
stringData:
  NEO4J_AUTH: neo4j/spcg-graph-change-me
  password: spcg-graph-change-me
---
apiVersion: v1
kind: Secret
metadata:
  name: spcg-graph-master-key
  namespace: spcg-control
type: Opaque
stringData:
  GRAPH_MASTER_KEY: change-me-tenant-encryption-key-32b
