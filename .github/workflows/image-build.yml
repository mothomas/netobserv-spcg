name: Build and push container images

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      registry:
        description: "Target registry (dockerhub or quay)"
        required: true
        default: dockerhub
        type: choice
        options:
          - dockerhub
          - quay

env:
  IMAGE_OWNER: ${{ vars.IMAGE_OWNER || 'mothomas' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend-engine
            dockerfile: deploy/Dockerfile.engine
            image: spcg-backend-engine
          - name: ui-portal
            dockerfile: deploy/Dockerfile.ui
            image: spcg-ui-portal
          - name: frontend
            dockerfile: deploy/Dockerfile.frontend
            image: spcg-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve registry
        id: reg
        env:
          DEFAULT_REGISTRY: ${{ vars.DEFAULT_REGISTRY || 'dockerhub' }}
          DISPATCH_REGISTRY: ${{ github.event.inputs.registry }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$DISPATCH_REGISTRY" ]; then
            choice="$DISPATCH_REGISTRY"
          else
            choice="$DEFAULT_REGISTRY"
          fi
          case "$choice" in
            quay)
              echo "registry=quay.io" >> "$GITHUB_OUTPUT"
              echo "use_quay=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "registry=docker.io" >> "$GITHUB_OUTPUT"
              echo "use_quay=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && steps.reg.outputs.use_quay == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Quay
        if: github.event_name != 'pull_request' && steps.reg.outputs.use_quay == 'true'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.reg.outputs.registry }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
