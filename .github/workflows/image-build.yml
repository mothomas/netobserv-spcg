name: Build and push container images

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      registry:
        description: "Target registry (dockerhub or quay)"
        required: true
        default: dockerhub
        type: choice
        options:
          - dockerhub
          - quay

env:
  IMAGE_OWNER: ${{ vars.IMAGE_OWNER || 'mothomas' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend-engine
            dockerfile: deploy/Dockerfile.engine
            image: spcg-backend-engine
          - name: ui-portal
            dockerfile: deploy/Dockerfile.ui
            image: spcg-ui-portal
          - name: frontend
            dockerfile: deploy/Dockerfile.frontend
            image: spcg-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve registry
        id: reg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            choice="${{ github.event.inputs.registry }}"
          else
            choice="${{ vars.DEFAULT_REGISTRY || 'dockerhub' }}"
          fi
          case "$choice" in
            quay)
              echo "registry=quay.io" >> "$GITHUB_OUTPUT"
              echo "username=${{ secrets.QUAY_USERNAME }}" >> "$GITHUB_OUTPUT"
              echo "password=${{ secrets.QUAY_TOKEN }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "registry=docker.io" >> "$GITHUB_OUTPUT"
              echo "username=${{ secrets.DOCKERHUB_USERNAME }}" >> "$GITHUB_OUTPUT"
              echo "password=${{ secrets.DOCKERHUB_TOKEN }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.reg.outputs.registry }}
          username: ${{ steps.reg.outputs.username }}
          password: ${{ steps.reg.outputs.password }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.reg.outputs.registry }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
